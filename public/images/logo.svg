<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60" role="img" aria-labelledby="logo-title">
  <title id="logo-title">PHPDocker.io</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    </style>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Gradient rounded square icon -->
  <rect x="0" y="2" width="56" height="56" rx="14" fill="url(#logo-grad)"/>

  <!-- </> code brackets -->
  <path d="M17,22 L9,30 L17,38" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="26" y1="19" x2="30" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M39,22 L47,30 L39,38" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="70" y="40" font-family="Syne,'Arial Black',system-ui,sans-serif" font-weight="800" font-size="26" fill="white">PHPDocker<tspan fill="#38bdf8">.io</tspan></text>
</svg>
